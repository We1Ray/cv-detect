name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install "fastapi>=0.100.0,<1.0.0" "uvicorn>=0.23.0,<1.0.0" "python-multipart>=0.0.6,<1.0.0"
          pip install pytest pytest-cov pytest-timeout
      - name: Run tests
        run: pytest tests/ --timeout=60 -v --tb=short
        env:
          PYTHONDONTWRITEBYTECODE: 1

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t cv-detect:latest .
      - name: Test Docker image
        run: |
          docker run -d --name test-api -p 8000:8000 cv-detect:latest
          sleep 5
          curl -f http://localhost:8000/health || exit 1
          docker stop test-api
